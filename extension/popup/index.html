<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Focus Lock</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main class="focus-shell">
    <section class="focus-hero">
      <div class="brand-row">
        <div class="brand-mark">
          <img src="../assets/icon48.png" alt="" />
        </div>
        <div>
          <h1>Focus Lock</h1>
          <p id="hero-subtitle">FOCUSLOCK - powered by Synapse</p>
        </div>
        <span class="status-pill" id="status-pill">Idle</span>
      </div>

      <div class="timer-stage" id="timer-stage">
        <svg class="progress-ring" viewBox="0 0 112 112" aria-hidden="true">
          <circle class="progress-track" cx="56" cy="56" r="48"></circle>
          <circle class="progress-value" id="progress-value" cx="56" cy="56" r="48"></circle>
        </svg>
        <div class="timer-copy">
          <span id="timer-label">Ready</span>
          <strong id="timer">02:00:00</strong>
        </div>
      </div>

      <div class="goal-chip" id="active-goal-chip">Deep study session</div>
    </section>

    <section class="panel" id="idle-state">
      <label class="field">
        <span>Current goal</span>
        <input id="focus-goal" type="text" maxlength="80" placeholder="Calculus lecture, mock test, revision..." />
      </label>

      <label class="field duration-field">
        <span>Session length</span>
        <div class="input-shell">
          <input id="duration-time" type="number" min="1" step="1" inputmode="numeric" placeholder="120" />
          <span>min</span>
        </div>
      </label>

      <button class="primary-button" id="start-btn">Start Focus Session</button>
      <button class="ghost-button" id="dashboard-btn">Open Synapse Dashboard</button>
    </section>

    <section class="panel active-panel" id="active-state">
      <div class="session-line">
        <span>Locked tab</span>
        <strong id="session-site">Current study page</strong>
      </div>

      <div class="stats-grid">
        <div>
          <span>Attempts</span>
          <strong id="violation-count">0</strong>
        </div>
        <div>
          <span>Score</span>
          <strong id="focus-score">100</strong>
        </div>
        <div>
          <span>Milestones</span>
          <strong id="milestone-count">0</strong>
        </div>
        <div>
          <span>Breaks</span>
          <strong id="breaks-left">0</strong>
        </div>
      </div>

      <div class="analytics-preview">
        <span>Peak interval</span>
        <strong id="peak-interval">Clean so far</strong>
      </div>

      <p class="break-status" id="break-status"></p>
      <p class="break-status stop-warning" id="stop-warning"></p>

      <div class="button-stack">
        <button class="secondary-button" id="break-btn">Take 6 Minute Break</button>
        <button class="danger-button" id="unlock-btn">Stop Session</button>
      </div>
    </section>

    <p class="sync-line" id="sync-line">Dashboard sync is ready.</p>
  </main>

  <script src="popup.js"></script>
</body>
</html>
